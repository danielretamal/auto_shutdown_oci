version: '3.8'

services:
  auto-shutdown:
    build: .
    container_name: oci_auto_shutdown
    restart: unless-stopped
    # network_mode: "host" # Uncomment if the container cannot reach the metadata IP (169.254.169.254)
    environment:
      # Credential options loaded from .env file
      - OCI_USER=${OCI_USER}
      - OCI_TENANCY=${OCI_TENANCY}
      - OCI_FINGERPRINT=${OCI_FINGERPRINT}
      - OCI_REGION=${OCI_REGION}
      - OCI_KEY_CONTENT=${OCI_KEY_CONTENT}
      - OCI_INSTANCE_ID=${OCI_INSTANCE_ID}
      
      # Check interval in seconds (1800 = 30 minutes)
      - CHECK_INTERVAL=${CHECK_INTERVAL:-1800}
      
      # Telegram notification settings (Optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      
      # Simulation and testing flags
      - SIMULATE_OVER_BUDGET=${SIMULATE_OVER_BUDGET:-false}
      - DRY_RUN=${DRY_RUN:-false}
      
    # Alternative: mount the physical OCI config file instead:
    # volumes:
    #   - ~/.oci:/root/.oci:ro
