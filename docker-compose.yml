version: '3.8'

services:
  auto-shutdown:
    build: .
    container_name: oci_auto_shutdown
    restart: unless-stopped
    environment:
      # Opciones de credenciales cargadas desde archivo .env
      - OCI_USER=${OCI_USER}
      - OCI_TENANCY=${OCI_TENANCY}
      - OCI_FINGERPRINT=${OCI_FINGERPRINT}
      - OCI_REGION=${OCI_REGION}
      - OCI_KEY_CONTENT=${OCI_KEY_CONTENT}
      - OCI_INSTANCE_ID=${OCI_INSTANCE_ID}
      
      # Intervalo de chequeo en segundos (1800 = 30 minutos)
      - CHECK_INTERVAL=${CHECK_INTERVAL:-1800}
      
      # Configuración de notificaciones Telegram (Opcional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      
      # Flags de simulación y pruebas
      - SIMULATE_OVER_BUDGET=${SIMULATE_OVER_BUDGET:-false}
      - DRY_RUN=${DRY_RUN:-false}
      
    # Alternativa si se prefiere montar el archivo de configuración físico de OCI:
    # volumes:
    #   - ~/.oci:/root/.oci:ro
